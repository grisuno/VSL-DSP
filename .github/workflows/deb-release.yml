name: Build and Release DEB Package

on:
  push:
    tags:
      - 'v*' # Triggered when pushing tags starting with v (e.g., v1.0.0)
  workflow_dispatch: # Allows manual execution from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcmocka-dev fakeroot pkg-config
          # Install kernel headers for building the module
          sudo apt-get install -y linux-headers-$(uname -r)

      - name: Extract version
        id: version
        run: |
          # If running on a tag, extract version from tag (remove 'v' prefix)
          # Otherwise, use a default version or extract from git
          if [[ "${GITHUB_REF_NAME}" =~ ^v.* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # For workflow_dispatch or other events, use short SHA or default
            VERSION="dev-${GITHUB_SHA::8}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version $VERSION"

      - name: Build DEB package
        run: |
          # Build using the existing deb target in Makefile
          # Pass the version if needed, or rely on the Makefile's default
          make deb VERSION="${{ steps.version.outputs.version }}" MAINTAINER="GitHub Actions <noreply@github.com>"

      - name: List built DEB files
        run: ls -la *.deb

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsl-dsp-deb
          path: ./*.deb

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
